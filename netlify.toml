[build]
  command = "echo 'Skipping build for static site'"
  publish = "."

[build.environment]
  NODE_VERSION = "20"  # Changed to latest LTS version (critical fix)

# Simplified plugin declaration (no installation needed)
[[plugins]]
  package = "@netlify/plugin-json-data"  # Official alternative
  [plugins.inputs]
    paths = ["_news/*.md"]  # Explicit file pattern

# Required CMS redirects (unchanged)
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Fixed headers syntax (array format)
[[headers]]
  for = "/_news/*.json"
  [headers.values]
    cache-control = "public, max-age=3600"

[[headers]]
  for = "/img/uploads/*"
  [headers.values]
    cache-control = "public, max-age=86400"
