<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GhanaPulse Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Include the CMS script -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  
  <!-- GhanaPulse branding -->
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 20px;
    }
    .logo {
      color: #CF0921;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
  
  <div class="logo">
    <h1>GhanaPulse CMS</h1>
  </div>
<script>
  CMS.init({
    config: {
      backend: {
        name: 'git-gateway',
        branch: 'main'
      },
      load_config_file: false,  // Disable auto-loading
      display_url: 'https://your-site.netlify.app',
      local_backend: true  // Enable local development
    }
  });
</script>
</body>
</html>
