<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhanaPulse | Latest News</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/favicon.ico">
  <style>
    /* Add these styles to make elements clickable */
    .news-article {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .news-article:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .news-article a {
      color: #CF0921;
      text-decoration: none;
      font-weight: bold;
    }
    .news-article a:hover {
      text-decoration: underline;
    }
    .category-heading {
      cursor: default; /* Keep headings non-clickable */
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <a href="index.html"><img src="images/logo.png" alt="GhanaPulse"></a>
      <h1><a href="index.html">GhanaPulse</a></h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="politics.html">Politics</a></li>
        <li><a href="sports.html">Sports</a></li>
        <li><a href="entertainment.html">Entertainment</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
    <div class="search-bar">
      <input type="text" placeholder="Search news...">
      <button onclick="searchNews()">🔍</button>
    </div>
  </header>

  <main>
    <section class="news-section">
      <h2>Latest News</h2>
      
      <!-- Dynamic Content Will Load Here -->
      <div id="news-container">
        <!-- Categories will be populated by JavaScript -->
        <div class="category-block" id="politics">
          <h3 class="category-heading">Politics</h3>
        </div>
        
        <div class="category-block" id="sports">
          <h3 class="category-heading">Sports</h3>
        </div>
        
        <div class="category-block" id="entertainment">
          <h3 class="category-heading">Entertainment</h3>
        </div>
      </div>
    </section>
  </main>

  <footer>&copy; 2025 GhanaPulse</footer>

  <script>
    // Enhanced news loader with click handlers
    async function loadNews() {
      try {
        const categories = ['politics', 'sports', 'entertainment'];
        
        for (const category of categories) {
          const response = await fetch(`/_news/${category}.json`);
          if (!response.ok) continue;
          
          const articles = await response.json();
          const container = document.getElementById(category);
          
          articles.forEach(article => {
            const articleEl = document.createElement('article');
            articleEl.className = `news-article ${article.featured ? 'featured' : ''}`;
            articleEl.innerHTML = `
              <h4><a href="/news/${article.slug}">${article.title}</a></h4>
              <p>${article.excerpt || article.body.substring(0, 150)}...</p>
              <div class="article-meta">
                © ${new Date(article.date).toLocaleDateString()} | ${article.read_time} min read
              </div>
              <a href="/news/${article.slug}" class="read-more">Read full story →</a>
            `;
            
            // Add click handler to entire article
            articleEl.addEventListener('click', (e) => {
              if (!e.target.closest('a')) {
                window.location.href = `/news/${article.slug}`;
              }
            });
            
            container.appendChild(articleEl);
          });
        }
      } catch (error) {
        console.error("News loading failed:", error);
        // Fallback to hardcoded content if API fails
        document.getElementById('news-container').innerHTML = `
          <!-- Your original hardcoded articles here -->
        `;
      }
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', () => {
      loadNews();
      
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    });

    function searchNews() {
      const query = document.querySelector('.search-bar input').value;
      window.location.href = `/search.html?q=${encodeURIComponent(query)}`;
    }
  </script>
</body>
</html>
