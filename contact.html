<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact GhanaPulse</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/favicon.ico">
</head>
<body>
  <header>
    <div class="logo">
      <a href="index.html"><img src="images/logo.png" alt="GhanaPulse"></a>
      <h1><a href="index.html">GhanaPulse</a></h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="politics.html">Politics</a></li>
        <li><a href="sports.html">Sports</a></li>
        <li><a href="entertainment.html">Entertainment</a></li>
        <li><a href="about.html">About</a></li>
        <li><a class="active" href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
    <div class="search-bar">
      <input type="text" placeholder="Search news...">
      <button>🔍</button>
    </div>
  </header>

  <main>
    <section class="contact-section">
      <h2>Contact Us</h2>
      <form>
        <label for="name">Name:</label>
        <input type="text" id="name" required>
        
        <label for="email">Email:</label>
        <input type="email" id="email" required>
        
        <label for="message">Message:</label>
        <textarea id="message" rows="5" required></textarea>
        
        <button type="submit">Send Message</button>
      </form>
      
      <div class="contact-info">
        <h3>Reach Us Directly</h3>
        <p>Email: <a href="mailto:info@ghanapulse.com">info@ghanapulse.com</a></p>
        <p>Phone: +233 123 456 789</p>
      </div>
    </section>
  </main>

  <footer>&copy; 2025 GhanaPulse</footer>
  <script src="js/search.js"></script>
</body>
</html>
