[build]
  command = "echo 'Static site - no build needed'"
  publish = "."
  functions = "netlify/functions"

[context.production]
  environment = { CMS_ENABLED = "true", SITE_URL = "https://ghanapulse.netlify.app" }

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    X-Frame-Options = "DENY"
